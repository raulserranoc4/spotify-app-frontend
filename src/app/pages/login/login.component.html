<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>
        Bienvenido a <span class="app-name">Wrappify</span>
      </mat-card-title>
      <mat-card-subtitle>
        Conectate y descubre tu mundo musical.
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p>
        Explora tus playlists, estadisticas y recomendaciones personalizadas al
        iniciar sesion con tu cuenta de Spotify.
      </p>
    </mat-card-content>

    <mat-card-actions>
      <button class="spotify-login-btn" (click)="loginWithSpotify()">
        Iniciar sesion con Spotify
      </button>
    </mat-card-actions>
  </mat-card>
</div>
