<div class="track-container">
  <div class="profile-wrapper">
    <mat-card *ngIf="topTracksLastWeek.length > 0" class="top-tracks-card">
      <mat-card-header>
        <mat-card-title>Top 10 canciones (ultima semana)</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-list>
          <mat-list-item
            *ngFor="let track of topTracksLastWeek"
            class="track-item"
          >
            <div class="track-info">
              <img
                [src]="track.album.images[2]?.url || 'assets/default-track.png'"
                alt="Imagen del track"
                class="track-image"
              />
              <div class="track-details">
                <mat-card-title>{{ track.name }}</mat-card-title>
                <mat-card-subtitle>
                  {{ track.artists[0].name }}
                </mat-card-subtitle>
              </div>
            </div>
          </mat-list-item>
        </mat-list>
      </mat-card-content>
    </mat-card>

    <mat-card *ngIf="topTracksLastMonth.length > 0" class="top-tracks-card">
      <mat-card-header>
        <mat-card-title>Top 10 canciones (ultimo mes)</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-list>
          <mat-list-item
            *ngFor="let track of topTracksLastMonth"
            class="track-item"
          >
            <div class="track-info">
              <img
                [src]="track.album.images[2]?.url || 'assets/default-track.png'"
                alt="Imagen del track"
                class="track-image"
              />
              <div class="track-details">
                <mat-card-title>{{ track.name }}</mat-card-title>
                <mat-card-subtitle>
                  {{ track.artists[0].name }}
                </mat-card-subtitle>
              </div>
            </div>
          </mat-list-item>
        </mat-list>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="btn-container">
    <button class="btn-download-image" (click)="obtainImage()">
      Obtener imagen
    </button>
  </div>
</div>
