<section class="track-container">
  <div class="track-shell">
    <div class="tracks-header">
      <div>
        <p class="eyebrow">Spotify API</p>
        <h1>Tus canciones favoritas</h1>
        <p>
          Compara tus canciones mas escuchadas de la ultima semana y del ultimo
          mes.
        </p>
      </div>

      <button class="primary-btn" (click)="obtainImage()">
        Obtener imagen
      </button>
    </div>

    <div class="tracks-grid">
      <mat-card *ngIf="topTracksLastWeek.length > 0" class="tracks-card">
        <mat-card-header>
          <mat-card-title class="card-title">
            Ultima semana
          </mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <div class="track-list">
            <article
              *ngFor="let track of topTracksLastWeek; let i = index"
              class="track-row"
              [class.track-row-featured]="i === 0"
            >
              <div class="rank-number">{{ i + 1 }}</div>
              <img
                [src]="track.album.images[1]?.url || track.album.images[2]?.url || 'assets/default-track.png'"
                alt="Imagen del track"
                class="track-image"
              />
              <div class="track-details">
                <h3>{{ track.name }}</h3>
                <p>{{ track.artists[0].name }}</p>
              </div>
            </article>
          </div>
        </mat-card-content>
      </mat-card>

      <mat-card *ngIf="topTracksLastMonth.length > 0" class="tracks-card">
        <mat-card-header>
          <mat-card-title class="card-title">
            Ultimo mes
          </mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <div class="track-list">
            <article
              *ngFor="let track of topTracksLastMonth; let i = index"
              class="track-row"
              [class.track-row-featured]="i === 0"
            >
              <div class="rank-number">{{ i + 1 }}</div>
              <img
                [src]="track.album.images[1]?.url || track.album.images[2]?.url || 'assets/default-track.png'"
                alt="Imagen del track"
                class="track-image"
              />
              <div class="track-details">
                <h3>{{ track.name }}</h3>
                <p>{{ track.artists[0].name }}</p>
              </div>
            </article>
          </div>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</section>
