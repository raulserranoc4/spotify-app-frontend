<div
  class="chart-wrapper"
  [class.monthly-chart-wrapper]="isMonthlyChart"
>
  <canvas
    baseChart
    [class.monthly-chart]="isMonthlyChart"
    [width]="chartWidth"
    [style.width]="chartStyleWidth"
    [height]="chartHeight"
    [datasets]="barChartData"
    [labels]="barChartLabels"
    [options]="barChartOptions"
    [type]="barChartType"
  >
  </canvas>
</div>
