<header class="header">
  <div class="spotify-title">Wrappify</div>

  <div class="header-actions">
    <button class="logout-button" (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Salir</span>
    </button>

    <img
      *ngIf="userImage"
      class="user-avatar"
      [src]="userImage"
      alt="Avatar de usuario"
    />
  </div>
</header>
